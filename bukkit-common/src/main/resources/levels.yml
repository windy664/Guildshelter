# ════════════════════════ GuildShelter 等级系统 ════════════════════════
#
# 这里集中管理两套等级体系：
#   · 【庄园等级】—— 成员个人地皮，等级决定【解锁额度上限】(能拥有多少个已解锁 chunk)。
#   · 【公会等级】—— 整个营地，决定【成员容量】与【主城解锁额度】。
#
# 独立成文件是为了方便以后扩展——每级的特权 / 费用 / 解锁功能等都加在这里。
# 单位：chunk = 16×16 方块。额度 = 已解锁的 chunk 数。
#
# 庄园默认采用 1~20 级成长。
# 重要：max-chunks 是单块庄园的物理地块边长上限，默认 15x15=225 chunk。
# 庄园等级只决定【已解锁 chunk 额度】，不会把物理地块变成 20 档不同边界。
# 性能优化(掉落物/方块实体/机器等)也按【庄园等级】缩放，由 manor.limits 控制。

# ───────────────────────── 庄园等级（成员个人地皮）─────────────────────────
manor:
  max-level: 20          # 庄园等级数；默认安排 1~20 级，满级后不能再升
  initial-chunks: 6      # 1 级解锁正方形边长 → 初始额度 6²=36（首次分配就整好这块）
  max-chunks: 15         # 单块庄园物理边长上限 15x15；20 级最多解锁 225 个 chunk

  # 每级庄园已解锁 chunk 额度上限。
  # 这些值是【额度】不是边长；玩家在 15x15 物理地块内逐步解锁可建造 chunk。
  levels:
    1: { unlock-chunks: 36 }
    2: { unlock-chunks: 45 }
    3: { unlock-chunks: 54 }
    4: { unlock-chunks: 64 }
    5: { unlock-chunks: 74 }
    6: { unlock-chunks: 84 }
    7: { unlock-chunks: 95 }
    8: { unlock-chunks: 106 }
    9: { unlock-chunks: 118 }
    10: { unlock-chunks: 130 }
    11: { unlock-chunks: 142 }
    12: { unlock-chunks: 155 }
    13: { unlock-chunks: 168 }
    14: { unlock-chunks: 181 }
    15: { unlock-chunks: 194 }
    16: { unlock-chunks: 205 }
    17: { unlock-chunks: 213 }
    18: { unlock-chunks: 219 }
    19: { unlock-chunks: 223 }
    20: { unlock-chunks: 225 }

  # ── 每个庄园【等级】的优化限制（"几级能有多少"）──────────────────────────
  # 写法：里程碑 + 向下继承。只写你要设的等级，中间没写的等级【沿用下面最近一个写过的等级】。
  #   维度：tiles=方块实体总数  drops=掉落物  animal/hostile/mob/vehicle=生物/载具  或机器命名空间 id
  #   没写进表的维度 = 不限（生物/载具则沿用玩家 /gs flag 自调）。
  #   有效上限 = 这里的等级值 + 管理员增量（/gs admin limit），再与玩家自调 cap 取紧。
