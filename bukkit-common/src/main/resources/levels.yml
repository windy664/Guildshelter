# ════════════════════════ GuildShelter 等级系统 ════════════════════════
#
# 这里集中管理两套等级体系：
#   · 【庄园等级】—— 成员个人地皮，等级决定【解锁额度上限】(能拥有多少个已解锁 chunk)。
#   · 【公会等级】—— 整个营地，决定【成员容量】与【主城解锁额度】。
#
# 独立成文件是为了方便以后扩展——每级的特权 / 费用 / 解锁功能等都加在这里。
# 单位：chunk = 16×16 方块。额度 = 已解锁的 chunk 数。
#
# 额度怎么算：从初始(1级)线性涨到满级，公式见 config.yml 成员庄园那段说明。
#   1 级额度 = initial-chunks²    满级额度 = max-chunks²    中间各级线性均摊。
# 性能优化(掉落物/方块实体/机器等)也按【庄园等级】缩放，配置在 config.yml 的 performance 段。

# ───────────────────────── 庄园等级（成员个人地皮）─────────────────────────
manor:
  max-level: 10          # 庄园等级数（想几级配几级；满级后不能再升）
  initial-chunks: 6      # 1 级解锁正方形边长 → 初始额度 6²=36（首次分配就整好这块）
  max-chunks: 15         # 满级边长 → 满级额度 15²=225，也是单块庄园的上限
  grow-per-level: 1      # 兼容旧配置：仅在没设 max-level 时按尺寸推算级数；新配置以 max-level 为准

  # ── 每个庄园【等级】的优化限制（"几级能有多少"）──────────────────────────
  # 写法：里程碑 + 向下继承。只写你要设的等级，中间没写的等级【沿用下面最近一个写过的等级】。
  #   维度：tiles=方块实体总数  drops=掉落物  animal/hostile/mob/vehicle=生物/载具  或机器命名空间 id
  #   没写进表的维度 = 不限（生物/载具则沿用玩家 /gs flag 自调）。
  #   有效上限 = 这里的等级值 + 管理员增量（/gs admin limit），再与玩家自调 cap 取紧。
  # 例：下面 3 级的 tiles 沿用 1 级=300；6 级的 tiles 沿用 5 级=900；5 级没写 drops 故沿用 1 级=200。
  limits:
    1:  { tiles: 300,  drops: 200, "minecraft:hopper": 4,  "minecraft:blast_furnace": 2 }
    5:  { tiles: 900,  drops: 400, "minecraft:hopper": 12, "minecraft:blast_furnace": 6 }
    10: { tiles: 2000, drops: 800, "minecraft:hopper": 24, "minecraft:blast_furnace": 12 }

  # 机器展示名（仅用于提示文案；与等级无关）。键 = 机器命名空间 id。
  machine-names:
    "minecraft:hopper": "漏斗"
    "minecraft:blast_furnace": "高炉"

# ───────────────────────── 公会等级（营地容量 + 主城）─────────────────────────
guild:
  max-level: 5           # 公会最高等级
  members-per-level: 5   # 每升一级放开的成员名额（容量 = 等级 × 本值，满级 5×5 = 25 人）

  # 主城：全公会共享的中央广场，独占【中心一格】——整格都是主城领地；额度随【公会等级】、只有会长/副会长能解锁。
  #
  # ⚠ 重要：主城的【物理大小】恒等于中心一格 = manor.max-chunks（和满级庄园一样大），【配不出更大的主城】。
  #   下面两个 *-unlock-chunks 只决定"会长能在这一格里【解锁建造多少格】"，不是城的边界，也不会让城变大变小：
  #   · 超出额度的城地仍属主城，只是【未解锁】——受保护(外人/普通成员动不了)、保持自然原貌，会长有额度时再解锁(形状自由)。
  #   · max-unlock-chunks 会自动夹到 ≤ manor.max-chunks（配大了只告警不崩服）。
  #   想让主城真比成员大，需要改布局算法(中心格跨多格)，非本配置能调。
  #   （旧键 initial-chunks / max-chunks 仍兼容读取，无需立刻改名。）
  main-city:
    initial-unlock-chunks: 3   # 建会初始解锁额度边长 → 初始可解锁 3²=9 格（建会即整好这块）
    max-unlock-chunks: 10      # 满级解锁额度边长 → 最多解锁 10²=100 格；自动夹到 ≤ manor.max-chunks

# 以后要加的东西（占位思路，暂未实现）：
#   · 每级费用 / 升级条件
#   · 每级解锁的 flag / 功能 / 权限
#   · 公会等级带来的 WorldBorder 扩张步长
