title: "&0庄园控制器 - 美化与护理"
size: 54
pane-material: GRAY_STAINED_GLASS_PANE

items:
  header:
    index: 4
    material: ANVIL
    name: "&b美化与护理"
    lore:
      - "&7面向建设前后的整理动作。"
      - "&7会改动世界的项目保留明确提示。"
      - ""
      - "&8不能在 GUI 内输入文字的项目，"
      - "&8这里先做成说明卡，不刷聊天。"
    action: ""
  clear:
    index: 20
    material: IRON_SHOVEL
    name: "&a清理地表"
    lore:
      - "&8清理当前庄园地表"
      - "&7用于重新规划建筑或清除自然杂物。"
      - "&7适合刚领地皮后快速整理入口区域。"
      - ""
      - "&8建议先把重要方块、箱子和机器挪走。"
      - "&c会改动地表，请确认站在目标庄园。"
      - ""
      - "&e点击开始清理流程"
    action: "command.clear"
  template:
    index: 21
    material: WRITABLE_BOOK
    name: "&a建筑模板"
    lore:
      - "&8建筑方案说明"
      - "&7模板适合保存成熟建筑布局，"
      - "&7以后可以迁移、复原或给其他庄园套用。"
      - ""
      - "&7常见用途:"
      - "&8▪ &7保存一套别墅结构"
      - "&8▪ &7给新地皮快速复原布局"
      - "&8▪ &7活动建筑统一发放"
      - ""
      - "&8当前 GUI 暂不承载模板命名输入。"
    action: "menu.controller.maintenance"
  move:
    index: 22
    material: MINECART
    name: "&a搬家"
    lore:
      - "&8迁移庄园位置"
      - "&7适合调整邻居、道路或景观布局。"
      - "&7会遵守费用、冷却与确认流程。"
      - ""
      - "&7搬家会保留庄园结构和数据，"
      - "&7但仍建议在低峰期操作。"
      - ""
      - "&e点击进入搬家流程"
    action: "menu.controller.maintenance"
  middle:
    index: 23
    material: TARGET
    name: "&a庄园中心"
    lore:
      - "&8定位完整地皮中心"
      - "&7无视 Home 设置，用于勘察或对齐建筑。"
      - "&7适合确认庄园边界、中心轴和主建筑方向。"
      - ""
      - "&e点击传送到中心"
    action: "command.middle"
  desc:
    index: 24
    material: OAK_SIGN
    name: "&a描述/展示"
    lore:
      - "&8展示文本说明"
      - "&7庄园描述会展示给访客，"
      - "&7也适合写主题、规则或建筑介绍。"
      - ""
      - "&7建议内容:"
      - "&8▪ &7庄园主题"
      - "&8▪ &7参观提醒"
      - "&8▪ &7活动说明"
      - ""
      - "&8当前 GUI 暂不承载文本输入。"
    action: ""
  maintenance:
    index: 31
    material: CRAFTING_TABLE
    name: "&e维护与迁移"
    lore:
      - "&8模板、子领地、搬家、交换、合并。"
      - "&7集中查看需要参数或文本输入的维护命令。"
      - "&7不会点击后刷空命令用法。"
      - ""
      - "&e点击打开维护与迁移页"
    action: "menu.controller.maintenance"
  back:
    index: 45
    material: ARROW
    name: "&e返回控制器"
    lore:
      - "&7回到庄园控制器首页。"
      - "&8适合在资料、升级、安全页之间切换。"
    action: "menu.controller"
  close:
    index: 49
    material: BARRIER
    name: "&c关闭"
    lore:
      - "&7关闭当前控制器界面。"
      - "&8不会触发清理、搬家或传送动作。"
    action: "close"
