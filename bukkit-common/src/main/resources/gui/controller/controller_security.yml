title: "&0庄园控制器 - 金库与安保"
size: 54
pane-material: GRAY_STAINED_GLASS_PANE

items:
  header:
    index: 4
    material: SHIELD
    name: "&c金库与安保"
    lore:
      - "&7管理访客、黑名单、Flag 与审计记录。"
      - "&7适合开放参观前检查风险。"
      - ""
      - "&8能直接完成的动作可点击。"
      - "&8需要输入玩家名的项目先做说明卡。"
    action: ""
  open:
    index: 20
    material: OAK_DOOR
    name: "&a临时开放访客"
    lore:
      - "&8临时允许访客进入"
      - "&7默认开放 60 分钟，适合展示、评分或活动。"
      - "&7开放期间访客规则按庄园 Flag 执行。"
      - ""
      - "&7适合建筑评选、好友参观、公开活动。"
      - "&c开放不代表允许破坏，仍受权限保护。"
      - ""
      - "&e点击开放 60 分钟"
    action: "command.open.60"
  close_visitors:
    index: 21
    material: IRON_DOOR
    name: "&c关闭访客"
    lore:
      - "&8恢复私有访问"
      - "&7立即关闭临时开放状态。"
      - "&7已信任成员仍按权限进入。"
      - ""
      - "&7适合活动结束、维护建筑或整理仓库时使用。"
      - ""
      - "&e点击关闭访客"
    action: "command.close"
  flag:
    index: 22
    material: REDSTONE_TORCH
    name: "&eFlag 设置"
    lore:
      - "&8细分行为规则说明"
      - "&7Flag 用来控制庄园行为策略，"
      - "&7例如交互、容器、提示、PVP 等。"
      - ""
      - "&7适合进阶庄主微调访问边界。"
      - "&7普通开放参观通常不需要改。"
      - ""
      - "&8当前 GUI 暂不承载具体 Flag 编辑。"
    action: ""
  deny:
    index: 23
    material: REDSTONE_BLOCK
    name: "&c黑名单"
    lore:
      - "&8拒绝特定玩家说明"
      - "&7黑名单用于限制不受欢迎的访客。"
      - "&7适合处理恶意参观、骚扰或破坏风险。"
      - ""
      - "&7需要指定玩家名，GUI 暂不直接输入。"
      - "&8以后可以扩展成玩家选择列表。"
      - ""
      - "&8这是说明卡"
    action: ""
  log:
    index: 24
    material: PAPER
    name: "&e审计日志"
    lore:
      - "&8关键变更记录"
      - "&7用于追踪升级、区块解锁、权限调整等操作。"
      - "&7适合管理员排查谁在什么时候改了什么。"
      - ""
      - "&8日志列表后续会做成独立页面。"
      - "&8这里先展示用途，不触发刷屏。"
      - ""
      - "&8这是说明卡"
    action: ""
  back:
    index: 45
    material: ARROW
    name: "&e返回控制器"
    lore:
      - "&7回到庄园控制器首页。"
      - "&8继续选择资料、升级、护理或活动。"
    action: "menu.controller"
  close:
    index: 49
    material: BARRIER
    name: "&c关闭"
    lore:
      - "&7关闭庄园控制器。"
      - "&8不会改变任何庄园设置。"
    action: "close"
