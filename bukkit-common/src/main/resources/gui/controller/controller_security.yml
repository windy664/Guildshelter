title: "&0庄园控制器 - 金库与安保"
size: 54
pane-material: GRAY_STAINED_GLASS_PANE

items:
  header:
    index: 4
    material: SHIELD
    name: "&c金库与安保"
    lore:
      - "&7访客状态: &f{visitor_status}"
      - "&7进入规则: &f{entry_policy}"
      - "&7离开规则: &f{exit_policy}"
      - "&7入场费: &e{price_text}"
      - ""
      - "&8这里集中展示访问、交互、黑名单和审计状态。"
    action: ""
  open:
    index: 20
    material: OAK_DOOR
    name: "&a临时开放访客"
    lore:
      - "&8临时允许访客进入"
      - "&7当前: &f{visitor_status}"
      - "&7提示: &f{visitor_action_hint}"
      - ""
      - "&7默认开放 60 分钟，适合展示、评分或活动。"
      - "&c开放不代表允许破坏，仍受权限和 Flag 保护。"
      - ""
      - "&e点击开放 60 分钟"
    action: "command.open.60"
  close_visitors:
    index: 21
    material: IRON_DOOR
    name: "&c关闭访客"
    lore:
      - "&8恢复私有访问"
      - "&7当前: &f{visitor_status}"
      - "&7进入规则: &f{entry_policy}"
      - ""
      - "&7会立即取消临时开放状态。"
      - "&7已信任成员仍按权限进入。"
      - ""
      - "&e点击关闭访客"
    action: "command.close"
  entry_rules:
    index: 22
    material: REDSTONE_TORCH
    name: "&e进出规则"
    lore:
      - "&7进入: &f{entry_policy}"
      - "&7离开: &f{exit_policy}"
      - "&7PVP: &f{pvp_status}"
      - "&7自定义 Flag: &f{flag_custom_count} 项"
      - ""
      - "&8进出规则来自 deny-entry / deny-exit。"
      - "&8临时开放会允许访客进入，但不改变 Flag。"
      - ""
      - "&e点击打开安保开关"
    action: "menu.controller.flags"
  interaction_rules:
    index: 23
    material: LEVER
    name: "&e访客交互"
    lore:
      - "&7普通交互: &f{use_status}"
      - "&7容器: &f{container_status}"
      - "&7载具: &f{vehicle_status}"
      - ""
      - "&8这些状态决定访客能否使用门、按钮、容器、船和矿车。"
      - "&8成员和管理员仍按权限体系放行。"
      - ""
      - "&e点击打开安保开关"
    action: "menu.controller.flags"
  deny:
    index: 24
    material: REDSTONE_BLOCK
    name: "&c黑名单"
    lore:
      - "&7黑名单人数: &f{deny_count}"
      - "&7共建人: &f{trusted_count}"
      - "&7普通成员: &f{member_count}"
      - ""
      - "&8黑名单用于限制特定玩家进入。"
      - "&8添加或移除对象仍需要玩家选择/命令输入。"
    action: ""
  messages:
    index: 30
    material: OAK_SIGN
    name: "&a进出提示"
    lore:
      - "&7进入提示: &f{greeting_status}"
      - "&7离开提示: &f{farewell_status}"
      - "&7显示方式: &f{titles_status}"
      - "&7成员通知: &f{notify_status}"
      - ""
      - "&8用于活动参观、庄园介绍和成员提醒。"
    action: ""
  economy:
    index: 31
    material: GOLD_INGOT
    name: "&e入场收费"
    lore:
      - "&7当前费用: &e{price_text}"
      - ""
      - "&8大于 0 时访客进入会尝试通过 Vault 扣费。"
      - "&8成员、共建人和管理员不按访客入场费处理。"
    action: ""
  log:
    index: 32
    material: PAPER
    name: "&e审计日志"
    lore:
      - "&7状态: &f{audit_status}"
      - ""
      - "&8用于追踪升级、解锁、权限调整等操作。"
      - "&8日志翻页仍走 /gs log，后续可拆成独立 GUI。"
    action: ""
  back:
    index: 45
    material: ARROW
    name: "&e返回控制器"
    lore:
      - "&7回到庄园控制器首页。"
      - "&8继续选择资料、升级、护理或活动。"
    action: "menu.controller"
  close:
    index: 49
    material: BARRIER
    name: "&c关闭"
    lore:
      - "&7关闭庄园控制器。"
      - "&8不会改变任何庄园设置。"
    action: "close"
