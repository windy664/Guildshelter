      - ""
      - "&7因为需要输入文字，"
      - "&7当前 GUI 暂不直接提交留言。"
      - ""
      - "&8这是说明卡"
    action: ""
  rate:
    index: 23
    material: NETHER_STAR
    name: "&e评分"
    lore:
      - "&8评分说明"
