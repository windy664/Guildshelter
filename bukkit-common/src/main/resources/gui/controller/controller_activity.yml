  board:
    index: 21
    material: OAK_SIGN
    name: "&a留言墙"
    lore:
      - "&8留言展示说明"
      - "&7留言墙用于集中展示访客反馈、"
      - "&7合作提醒和活动记录。"
      - ""
      - "&7适合庄主回看访客评价，"
      - "&7也适合做活动期间的公开记录。"
      - ""
      - "&8留言墙后续会做成独立列表页面。"
      - "&8这里先展示用途，不触发刷屏。"
