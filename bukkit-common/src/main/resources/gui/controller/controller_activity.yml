title: "&0庄园控制器 - 活动"
size: 54
pane-material: GRAY_STAINED_GLASS_PANE

items:
  header:
    index: 4
    material: WHEAT
    name: "&d活动"
    lore:
      - "&7围绕访客、好友和评价的轻量入口。"
      - "&7适合活动期或开放参观时使用。"
      - ""
      - "&8能直接完成的互动保留点击。"
