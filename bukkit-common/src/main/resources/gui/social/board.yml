# ============================================================
# 留言板 - 独立页面
# ============================================================
# /gs board 命令打开，展示脚下庄园的访客留言。
# 从控制器活动页也可进入（menu.controller.activity.board）。
#
# 可用占位符：
#   {guild} {slot} {alias}
#   {comment_count}
#   {comment_preview_1} ~ {comment_preview_10}

