name: GuildShelter
main: org.windy.guildshelter.bukkit.GuildShelterBukkitPlugin
version: ${mod_version}
api-version: 1.26
# 硬前置：纯 Bukkit 端整地/铺路【强制走 FAWE】（已砍原生 setType 兜底），故 FAWE 缺席则整个插件拒绝加载。
depend:
  - FastAsyncWorldEdit
softdepend:
  - PlayerGuild
  - LegendaryGuild
  - LegendaryGuildRemapped
  - Vault
  - DecentHolograms
  - Iris
# 运行期由服务端的库加载器拉取(不打进 jar)。Youer(Spigot 系) 1.26 应支持; 若不支持需改为 shade。
libraries:
  - com.zaxxer:HikariCP:5.0.0
  - org.xerial:sqlite-jdbc:3.47.1.0
  - com.mysql:mysql-connector-j:8.4.0
commands:
  gs:
    description: GuildShelter 公会营地插件命令
    usage: /gs <子命令> | /gs help 查看全部命令
permissions:
  guildshelter.admin:
    description: 全权管理 GuildShelter（自动拥有所有 admin 子节点）
    default: op
  guildshelter.admin.build.other:
    description: 在别人庄园建造
    default: op
  guildshelter.admin.build.road:
    description: 在道路建造
    default: op
  guildshelter.admin.destroy.other:
    description: 在别人庄园破坏
    default: op
  guildshelter.admin.destroy.road:
    description: 在道路破坏
    default: op
  guildshelter.admin.interact.other:
    description: 在别人庄园交互
    default: op
  guildshelter.admin.interact.road:
    description: 在道路交互
    default: op
  guildshelter.admin.flag.other:
    description: 管理别人庄园的 flag
    default: op
  guildshelter.admin.trust.other:
    description: 管理别人庄园的 trust/member/deny
    default: op
  guildshelter.admin.bypass.border:
    description: 无视世界边界
    default: op
  guildshelter.admin.bypass.entry:
    description: 无视 deny-entry（可进入被谢客的庄园）
    default: op
  guildshelter.bypass.deny:
    description: 旧版兼容节点（等效 admin.bypass.entry）
    default: op
  guildshelter.flag.set:
    description: flag 设置总开关（庄主天然有，此节点控制非庄主能否设 flag）
    default: true
  guildshelter.trust.everyone:
    description: 允许用 * 批量 trust
    default: op
  guildshelter.deny.everyone:
    description: 允许用 * 批量 deny
    default: op
  # 各 /gs 玩家子命令的开关，默认全放行；服主想按等级收紧时改 default 或在权限组里改。
  guildshelter.command.home: { default: true }
  guildshelter.command.spawn: { default: true }
  guildshelter.command.upgrade: { default: true }
  guildshelter.command.info: { default: true }
  guildshelter.command.trust: { default: true }
  guildshelter.command.untrust: { default: true }
  guildshelter.command.member: { default: true }
  guildshelter.command.deny: { default: true }
  guildshelter.command.undeny: { default: true }
  guildshelter.command.list: { default: true }
  guildshelter.command.visit: { default: true }
  guildshelter.command.clear: { default: true }
  guildshelter.command.flag: { default: true }
  guildshelter.command.card: { default: true }
  guildshelter.command.alias: { default: true }
  guildshelter.command.sethome: { default: true }
  guildshelter.command.done: { default: true }
  guildshelter.command.kick: { default: true }
  guildshelter.command.near: { default: true }
  guildshelter.command.rate: { default: true }
  guildshelter.command.top: { default: true }
  guildshelter.command.middle: { default: true }
  guildshelter.command.comment: { default: true }
  guildshelter.command.inbox: { default: true }
  guildshelter.command.swap: { default: true }
  guildshelter.command.grant: { default: true }
  guildshelter.command.merge: { default: true }
  guildshelter.command.unmerge: { default: true }
  guildshelter.command.confirm: { default: true }
  guildshelter.command.help: { default: true }
  guildshelter.command.desc: { default: true }
  guildshelter.command.toggle: { default: true }
  guildshelter.command.template: { default: true }
  guildshelter.command.sub: { default: true }
  guildshelter.command.bulletin: { default: true }
  guildshelter.command.move: { default: true }
  guildshelter.command.open: { default: true }
  guildshelter.command.close: { default: true }
  guildshelter.command.flower: { default: true }
  guildshelter.command.gift: { default: true }
  guildshelter.command.board: { default: true }
  guildshelter.command.citytrust: { default: true }
  guildshelter.command.cityuntrust: { default: true }
  guildshelter.command.unlock: { default: true }
  guildshelter.command.cityunlock: { default: true }
  guildshelter.command.claim: { default: true }
  guildshelter.command.manors: { default: true }
  guildshelter.command.setspawn: { default: true }
  guildshelter.command.holo: { default: true }
  guildshelter.command.greeting: { default: true }
  guildshelter.command.farewell: { default: true }
  guildshelter.command.log: { default: true }
